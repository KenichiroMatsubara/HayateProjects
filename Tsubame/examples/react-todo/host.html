<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Miharashi Host — Tsubame React TODO</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b1020; }
      /*
       * Miharashi ホストページ（#531：FW 非依存の実証）。solid 版（examples/todo/host.html）と
       * 同型の、フレームワークも renderer-canvas も持たない素のシェル：surface（canvas）を 1 枚
       * 置き、@miharashi/host-web が dev-server から react バンドルを fetch → eval し、
       * createHayateWebHost でこの canvas 上に host bootstrap を確立してバンドルの mount に渡す。
       * ホスト側に react 固有のコードは一切無い（バンドルが react を持ち込む・ADR-0001）。
       */
      #miharashi-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        display: block;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <canvas id="miharashi-canvas"></canvas>
    <script type="module" src="/src/host-boot.ts"></script>
  </body>
</html>
