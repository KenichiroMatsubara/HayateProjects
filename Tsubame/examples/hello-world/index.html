<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tsubame 燕 — TODO Board（Solid Native デモ）</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        background: #020617;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      }
      #dom-host, #canvas-stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }
      #dom-host[hidden], #canvas-stage[hidden] { display: none; }
      #canvas-stage { display: block; }

      /* モード切替バー（HTML オーバーレイ） */
      #mode-bar {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid #1e293b;
        border-radius: 999px;
        backdrop-filter: blur(8px);
        font-size: 11px;
        font-family: ui-monospace, Menlo, monospace;
        color: #94a3b8;
        pointer-events: auto;
      }
      #mode-bar a {
        color: #94a3b8;
        text-decoration: none;
        padding: 3px 10px;
        border-radius: 999px;
        transition: background .15s, color .15s;
      }
      #mode-bar a:hover { color: #f1f5f9; background: #1e293b; }
      #mode-bar a.active { color: #021029; background: #38bdf8; font-weight: 700; }
      #mode-bar .sep { color: #334155; }
      #mode-bar .src { color: #64748b; font-size: 10px; }
    </style>
  </head>
  <body>
    <div id="mode-bar">
      <a id="link-dom" href="?mode=dom">DOM</a>
      <span class="sep">·</span>
      <a id="link-canvas" href="?mode=canvas">Canvas</a>
      <span class="sep">·</span>
      <a id="link-auto" href="./">auto</a>
      <span class="sep">|</span>
      <span class="src" id="src-label">source</span>
    </div>
    <div id="dom-host" hidden></div>
    <canvas id="canvas-stage" hidden></canvas>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
