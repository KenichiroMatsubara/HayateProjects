<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tsubame Task Studio</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        background: #0b1020;
        color: #d8e2f2;
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      }
      #dom-host, #canvas-stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
      }
      #dom-host[hidden], #canvas-stage[hidden] { display: none; }
      #canvas-stage { display: block; cursor: default; }

      /*
       * Renderer 切替UI（Hayate アプリの外側に置く素の HTML オーバーレイ）。
       * 色は App.tsx が解決済みパレットから document.documentElement へ流し込む
       * CSS 変数（--rsw-*）に追従する。fallback はライト teal（既定テーマ）。
       * 既定は格納（ハンドルのみ）で、タップすると2列（レンダラ／最適化）が展開する。
       */
      #renderer-switch {
        position: fixed;
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        font-family: inherit;
      }
      #renderer-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border: 1px solid var(--rsw-line, #d9d3c6);
        border-radius: 999px;
        background: color-mix(in srgb, var(--rsw-bg, #fbf8f1) 90%, transparent);
        backdrop-filter: blur(6px);
        color: var(--rsw-ink, #262130);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        font-family: inherit;
      }
      #renderer-toggle:hover { background: var(--rsw-hover, #e0d8c7); }
      .rsw-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--rsw-accent, #14b8a6);
      }
      /* 展開パネル: 1列目=レンダラ選択、2列目=最適化(layer-present)トグル（ADR-0135）。 */
      .rsw-panel {
        display: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      #renderer-switch[data-open='true'] .rsw-panel { display: flex; }
      .rsw-options {
        display: flex;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--rsw-line, #d9d3c6);
        background: color-mix(in srgb, var(--rsw-bg, #fbf8f1) 90%, transparent);
        backdrop-filter: blur(6px);
      }
      .rsw-options button {
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        border-radius: 999px;
        border: none;
        background: transparent;
        color: var(--rsw-text, #6f6878);
        cursor: pointer;
        font-family: inherit;
      }
      .rsw-options button.active {
        background: var(--rsw-accent, #14b8a6);
        color: var(--rsw-on-accent, #14101c);
      }
      .rsw-options button:hover:not(.active) {
        color: var(--rsw-ink, #262130);
        background: var(--rsw-hover, #e0d8c7);
      }
      .rsw-optimize-label {
        padding: 4px 6px 4px 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.03em;
        color: var(--rsw-text, #6f6878);
        white-space: nowrap;
      }
    </style>
    <script>
      // 起動前にテーマ別の初期色を流し込み、ブート完了までのチラつきを防ぐ。
      // 正本は App.tsx の createEffect（解決済みパレット）。ここは boot 時の近似。
      (function seedRendererSwitchTheme() {
        let prefs = {};
        try {
          prefs = JSON.parse(window.localStorage.getItem('pop-theme-v1') || '{}') || {};
        } catch {
          prefs = {};
        }
        const dark = prefs.theme === 'dark';
        const accents = {
          teal: ['#14b8a6', '#4fd1c5'],
          pink: ['#e84d8a', '#f472b6'],
          orange: ['#ef8f3c', '#fb923c'],
          lime: ['#5ca80f', '#a3e635'],
          violet: ['#7c5cf0', '#a78bfa'],
        };
        const acc = accents[prefs.accent] || accents.teal;
        const root = document.documentElement.style;
        root.setProperty('--rsw-bg', dark ? '#111827' : '#fbf8f1');
        root.setProperty('--rsw-line', dark ? '#31425b' : '#d9d3c6');
        root.setProperty('--rsw-text', dark ? '#8ea1bb' : '#6f6878');
        root.setProperty('--rsw-ink', dark ? '#eef4ff' : '#262130');
        root.setProperty('--rsw-hover', dark ? '#21344e' : '#e0d8c7');
        root.setProperty('--rsw-on-accent', dark ? '#070b14' : '#14101c');
        root.setProperty('--rsw-accent', dark ? acc[1] : acc[0]);
      })();
    </script>
  </head>
  <body>
    <div id="renderer-switch" data-open="false" aria-label="Renderer switch">
      <button type="button" id="renderer-toggle" aria-expanded="false" aria-controls="renderer-panel" title="レンダラを切り替え">
        <span class="rsw-dot" aria-hidden="true"></span>
        <span id="renderer-current">auto</span>
      </button>
      <div class="rsw-panel" id="renderer-panel">
        <div class="rsw-options" id="renderer-options" role="group" aria-label="レンダラ">
          <button type="button" data-renderer="auto">auto</button>
          <!--
            skia-safe は Web デモの既定レンダラ（プロジェクト主力）。ただし rust-skia は
            wasm32 非対応（ADR-0146）なので、Web では skia 系 CPU ラスタライザの tiny-skia
            backend へ委譲する（detect-mode.ts の SKIA_SAFE_WEB_BACKEND）。
          -->
          <button type="button" data-renderer="skia-safe">skia-safe</button>
          <button type="button" data-renderer="vello">vello</button>
          <button type="button" data-renderer="tiny-skia">tiny-skia</button>
          <button type="button" data-renderer="vello-cpu">vello-cpu</button>
          <button type="button" data-renderer="dom">dom</button>
        </div>
        <!--
          ADR-0137 により Web は既定 ON。vello レンダラー選択時のみ効く layer-present
          （per-layer 経路）の比較用トグル — OFF で全面 raster 版に戻せる。
        -->
        <div
          class="rsw-options"
          id="layer-present-options"
          role="group"
          aria-label="layer-present（vello レンダラー選択時のみ有効）"
        >
          <span class="rsw-optimize-label">layer-present</span>
          <button type="button" data-layer-present="0">OFF</button>
          <button type="button" data-layer-present="1">ON</button>
        </div>
        <!--
          ADR-0138: tiny-skia/vello-cpu レンダラー選択時のみ効く per-layer 経路の比較用
          トグル。既知のバグはないため vello の列と違い警告色は使わない。既定 ON。
        -->
        <div
          class="rsw-options"
          id="cpu-layer-present-options"
          role="group"
          aria-label="layer-present（tiny-skia/vello-cpu レンダラー選択時のみ有効）"
        >
          <span class="rsw-optimize-label">layer-present</span>
          <button type="button" data-cpu-layer-present="0">OFF</button>
          <button type="button" data-cpu-layer-present="1">ON</button>
        </div>
      </div>
    </div>
    <div id="dom-host" hidden></div>
    <canvas id="canvas-stage" hidden></canvas>
    <script>
      (function initRendererSwitch() {
        const params = new URLSearchParams(window.location.search);
        // 既定は skia-safe（detect-mode.ts の DEFAULT_RENDERER と一致させる）。
        const current = params.get('renderer') ?? 'skia-safe';
        const layerPresentOn = params.get('layerPresent') !== '0';
        const root = document.getElementById('renderer-switch');
        const toggle = document.getElementById('renderer-toggle');
        const currentLabel = document.getElementById('renderer-current');
        currentLabel.textContent = current;

        // 開閉状態は localStorage に保存し、再読込でも維持する。
        const setOpen = (open) => {
          root.dataset.open = String(open);
          toggle.setAttribute('aria-expanded', String(open));
          window.localStorage.setItem('rsw-open', String(open));
        };
        setOpen(window.localStorage.getItem('rsw-open') === 'true');
        toggle.addEventListener('click', () => setOpen(root.dataset.open !== 'true'));

        for (const button of root.querySelectorAll('button[data-renderer]')) {
          const value = button.getAttribute('data-renderer');
          if (value === current) button.classList.add('active');
          button.addEventListener('click', () => {
            const next = new URLSearchParams(window.location.search);
            next.set('renderer', value);
            const query = next.toString();
            window.location.search = query ? `?${query}` : '';
          });
        }

        // layer-present トグル: ADR-0137 により既定 ON。OFF で全面 raster 版に戻す。
        for (const button of root.querySelectorAll('button[data-layer-present]')) {
          const isOn = button.getAttribute('data-layer-present') === '1';
          if (isOn === layerPresentOn) button.classList.add('active');
          button.addEventListener('click', () => {
            const next = new URLSearchParams(window.location.search);
            if (isOn) next.delete('layerPresent');
            else next.set('layerPresent', '0');
            const query = next.toString();
            window.location.search = query ? `?${query}` : '';
          });
        }

        // tiny-skia/vello-cpu 用 layer-present トグル（ADR-0138）: 既定 ON。OFF で全面
        // raster 版に戻す。vello の `layerPresent` とは別のクエリキー。
        const cpuLayerPresentOn = params.get('cpuLayerPresent') !== '0';
        for (const button of root.querySelectorAll('button[data-cpu-layer-present]')) {
          const isOn = button.getAttribute('data-cpu-layer-present') === '1';
          if (isOn === cpuLayerPresentOn) button.classList.add('active');
          button.addEventListener('click', () => {
            const next = new URLSearchParams(window.location.search);
            if (isOn) next.delete('cpuLayerPresent');
            else next.set('cpuLayerPresent', '0');
            const query = next.toString();
            window.location.search = query ? `?${query}` : '';
          });
        }

        // 「最適化(layer-present)」行の二重表示バグ修正。vello 行（`layerPresent`）と
        // tiny-skia/vello-cpu 行（`cpuLayerPresent`）は対象レンダラも効くキーも別なのに
        // 両方を常時表示していたため、同一に見えるトグルが二段重なっていた。選択中の
        // レンダラに対応する 1 行だけを見せる（detect-mode.ts の backend 解決と同規則）。
        const velloRow = document.getElementById('layer-present-options');
        const cpuRow = document.getElementById('cpu-layer-present-options');
        const layerFamilyFor = (renderer) => {
          if (renderer === 'vello') return 'vello';
          // skia-safe は Web では tiny-skia backend（ADR-0146）＝ cpu 系トグルが効く。
          if (renderer === 'tiny-skia' || renderer === 'vello-cpu' || renderer === 'skia-safe') {
            return 'cpu';
          }
          // canvaskit(ADR-0148 DRAFT)は per-layer present を持たない(supports_layer_present=false)
          // ので最適化行は出さない。
          if (renderer === 'canvaskit') return 'none';
          if (renderer === 'dom') return 'none';
          if (renderer === 'auto') {
            // auto は detect-mode と同じ判定で実効 backend を先読みする。
            if (!('EditContext' in window)) return 'none'; // DOM 経路
            return 'gpu' in navigator ? 'vello' : 'cpu';
          }
          return 'cpu'; // 既定 skia-safe
        };
        const family = layerFamilyFor(current);
        velloRow.style.display = family === 'vello' ? 'flex' : 'none';
        cpuRow.style.display = family === 'cpu' ? 'flex' : 'none';
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
