<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tsubame — 動的追加・削除</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a; color: #e2e8f0;
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 16px 48px;
    }
    .back-link {
      display: inline-block; align-self: flex-start; margin-bottom: 14px;
      font-size: .68rem; color: #64748b; text-decoration: none;
      letter-spacing: .04em; padding: 4px 10px;
      border: 1px solid #334155; border-radius: 999px;
    }
    .back-link:hover { color: #94a3b8; border-color: #475569; }
    .lv-badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: .6rem; font-weight: 900; letter-spacing: .08em; color: #fff; margin-bottom: 6px;
    }
    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 1rem; font-weight: 900; color: #f8fafc; letter-spacing: -.02em; }
    header p  { font-size: .7rem; color: #475569; margin-top: 4px; }
    .pipeline { display: flex; align-items: center; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .step {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px;
      border: 1px solid #334155; background: #1e293b;
      font-size: .65rem; font-weight: 700; color: #64748b; white-space: nowrap;
    }
    .step .dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; flex-shrink: 0; }
    .step.ok   { color: #4ade80; border-color: #166534; background: #052e16; }
    .step.ok .dot   { background: #4ade80; }
    .step.run  { color: #818cf8; border-color: #3730a3; background: #1e1b4b; animation: pulse .9s ease-in-out infinite; }
    .step.run .dot  { background: #818cf8; }
    .step.fail { color: #f87171; border-color: #7f1d1d; background: #2d0a0a; }
    .step.fail .dot { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
    .canvas-wrap {
      position: relative; border: 2px solid #334155;
      border-radius: 10px; overflow: hidden; background: #020617;
    }
    canvas { display: block; }
    #canvas-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: #020617ee; font-size: .85rem; color: #64748b;
      text-align: center; padding: 24px; transition: opacity .3s;
    }
    #canvas-overlay.gone { opacity: 0; pointer-events: none; }
    #overlay-icon { font-size: 2rem; }
    #overlay-msg  { font-weight: 700; }
    #overlay-sub  { font-size: .7rem; color: #475569; max-width: 380px; line-height: 1.6; }
    .panel { margin-top: 20px; width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 14px; }
    .section { border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; }
    .section-title {
      padding: 8px 14px; font-size: .65rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .1em; color: #475569; background: #1e293b44;
    }
    .section-body { padding: 14px; }
    button {
      padding: 6px 14px; border: 1px solid #334155; border-radius: 6px;
      background: #1e293b; color: #e2e8f0;
      font-family: inherit; font-size: .72rem; font-weight: 700; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    button:hover:not(:disabled) { background: #334155; border-color: #475569; }
    button:disabled { opacity: .35; cursor: not-allowed; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .counter {
      font-size: .72rem; color: #94a3b8;
      padding: 4px 12px; border: 1px solid #1e293b; border-radius: 6px; background: #0a1120;
    }
    .log {
      margin-top: 10px; max-height: 100px; overflow-y: auto;
      font-size: .6rem; color: #64748b; line-height: 1.7;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>

  <a href="./index.html" class="back-link">← 一覧に戻る</a>

  <header>
    <div class="lv-badge" style="background:#0891b2">Tsubame-02</div>
    <h1>動的追加・削除 (OP_APPEND_CHILD / OP_REMOVE)</h1>
    <p>element_create + apply_mutations で要素を動的に追加・削除する。T3 バグ修正の確認。</p>
  </header>

  <div class="pipeline" id="pipeline">
    <div class="step" id="s1"><span class="dot"></span>WebGPU</div>
    <div class="step" id="s2"><span class="dot"></span>WASM</div>
    <div class="step" id="s3"><span class="dot"></span>Renderer</div>
    <div class="step" id="s4"><span class="dot"></span>初期シーン</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="640" height="360"></canvas>
    <div id="canvas-overlay">
      <div id="overlay-icon">⏳</div>
      <div id="overlay-msg">初期化中...</div>
      <div id="overlay-sub"></div>
    </div>
  </div>

  <div class="panel">
    <div class="section">
      <div class="section-title">操作</div>
      <div class="section-body">
        <div class="controls">
          <button id="addBtn" disabled>＋ 追加</button>
          <button id="removeBtn" disabled>－ 最後を削除</button>
          <button id="removeAllBtn" disabled>全削除</button>
          <span class="counter">要素数: <span id="countLabel">0</span></span>
        </div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <script type="module">
    const TAG = {
      BACKGROUND_COLOR: 0, WIDTH: 5, HEIGHT: 6,
      DISPLAY: 11, ALIGN_ITEMS: 13, JUSTIFY_CONTENT: 14,
      GAP: 15, PADDING: 16,
    };
    const UNIT = { PX: 0 };
    const OP = { APPEND_CHILD: 0, REMOVE: 2, SET_ROOT: 3, SET_STYLE: 4 };

    // ── パレット: 追加ごとに色が変わる ────────────────────────────────────
    const PALETTE = [
      [0.23, 0.51, 0.96], [0.96, 0.62, 0.04], [0.06, 0.73, 0.51],
      [0.86, 0.27, 0.27], [0.58, 0.27, 0.86], [0.27, 0.76, 0.86],
    ];

    class TsunameBatch {
      constructor() { this.ops = []; this.styles = []; }
      setRoot(id)       { this.ops.push(OP.SET_ROOT, id); }
      appendChild(p, c) { this.ops.push(OP.APPEND_CHILD, p, c); }
      remove(id)        { this.ops.push(OP.REMOVE, id); }
      setStyle(id, ...slots) {
        const off = this.styles.length;
        this.styles.push(...slots);
        this.ops.push(OP.SET_STYLE, id, off, slots.length);
      }
      flush(renderer) {
        if (this.ops.length === 0) return;
        renderer.apply_mutations(new Float64Array(this.ops), new Float32Array(this.styles));
        this.ops = []; this.styles = [];
      }
    }

    const $ = id => document.getElementById(id);
    function step(id, st) { $(id).className = `step ${st}`; }
    function overlay(icon, msg, sub = '') {
      $('overlay-icon').textContent = icon;
      $('overlay-msg').textContent  = msg;
      $('overlay-sub').textContent  = sub;
    }
    function overlayGone() { $('canvas-overlay').classList.add('gone'); }
    function log(msg) {
      const el = document.createElement('div');
      el.textContent = msg;
      $('log').prepend(el);
    }

    // WebGPU 検出
    step('s1', 'run'); overlay('🔍', 'WebGPU を検出中...');
    let webgpuOk = false;
    try { if (navigator.gpu) { const a = await navigator.gpu.requestAdapter(); webgpuOk = !!a; } } catch {}
    if (!webgpuOk) {
      step('s1', 'fail');
      overlay('❌', 'WebGPU 非対応', 'Chromium 系ブラウザが必要です。'); throw new Error('no WebGPU');
    }
    step('s1', 'ok');

    // WASM ロード
    step('s2', 'run'); overlay('📦', 'WASM を読み込み中...');
    let mod;
    try { mod = await import('./pkg/hayate_adapter_web.js'); await mod.default(); step('s2', 'ok'); }
    catch(e) { step('s2', 'fail'); overlay('❌', 'WASM ロード失敗', String(e)); throw e; }

    // Renderer 初期化
    step('s3', 'run'); overlay('⚙️', 'Renderer を初期化中...');
    let renderer;
    try {
      renderer = await mod.HayateElementRenderer.init($('canvas'));
      renderer.set_background_color(0.04, 0.09, 0.18);
      step('s3', 'ok');
    } catch(e) { step('s3', 'fail'); overlay('❌', String(e)); throw e; }

    // 初期シーン: root コンテナ (flex wrap, gap 16)
    step('s4', 'run'); overlay('🌿', '初期シーンを構築中...');
    let rootId;
    try {
      rootId = renderer.element_create(mod.element_kind_view());
      const b = new TsunameBatch();
      b.setRoot(rootId);
      b.setStyle(rootId,
        TAG.BACKGROUND_COLOR, 0.04, 0.09, 0.18, 1.0,
        TAG.WIDTH,  640, UNIT.PX,
        TAG.HEIGHT, 360, UNIT.PX,
        TAG.DISPLAY, 0,       // FLEX
        TAG.ALIGN_ITEMS, 0,   // flex-start (wrap で左上から並べる)
        TAG.JUSTIFY_CONTENT, 0,
        TAG.GAP, 16, UNIT.PX,
        TAG.PADDING, 24, UNIT.PX,
      );
      b.flush(renderer);
      renderer.render(performance.now());
      step('s4', 'ok');
      overlayGone();
    } catch(e) { step('s4', 'fail'); overlay('❌', String(e)); throw e; }

    // ── マウスイベント配線 ─────────────────────────────────────────────────
    const canvas = $('canvas');
    function canvasXY(e) {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * (canvas.width / r.width),
              (e.clientY - r.top)  * (canvas.height / r.height)];
    }
    canvas.addEventListener('mousemove', e => { const [x,y] = canvasXY(e); renderer.on_pointer_move(x, y); });
    canvas.addEventListener('mousedown', e => { const [x,y] = canvasXY(e); renderer.on_pointer_down(x, y); });
    canvas.addEventListener('mouseup',   e => { const [x,y] = canvasXY(e); renderer.on_pointer_up(x, y); });

    // ── 状態管理 ──────────────────────────────────────────────────────────
    const children = []; // { id, colorIndex }
    let colorIndex = 0;

    function updateUI() {
      $('countLabel').textContent = children.length;
      $('removeBtn').disabled    = children.length === 0;
      $('removeAllBtn').disabled = children.length === 0;
    }

    function addBox() {
      const [r, g, b] = PALETTE[colorIndex % PALETTE.length];
      colorIndex++;

      // element_create はバッチ外（戻り値 ID が必要なため ADR-0039）
      const id = renderer.element_create(mod.element_kind_view());
      const batch = new TsunameBatch();
      batch.appendChild(rootId, id);
      batch.setStyle(id,
        TAG.BACKGROUND_COLOR, r, g, b, 0.85,
        TAG.WIDTH,  80, UNIT.PX,
        TAG.HEIGHT, 80, UNIT.PX,
      );
      batch.flush(renderer);
      children.push({ id, r, g, b });
      updateUI();
      log(`+ append  id=${id}  rgb(${(r*255)|0},${(g*255)|0},${(b*255)|0})`);
    }

    function removeLast() {
      if (children.length === 0) return;
      const { id } = children.pop();
      const batch = new TsunameBatch();
      batch.remove(id);
      batch.flush(renderer);
      updateUI();
      log(`- remove  id=${id}`);
    }

    function removeAll() {
      if (children.length === 0) return;
      const batch = new TsunameBatch();
      for (const { id } of children) batch.remove(id);
      batch.flush(renderer);
      const n = children.length;
      children.length = 0;
      updateUI();
      log(`- remove all (${n} 要素)`);
    }

    $('addBtn').disabled = false;
    $('addBtn').addEventListener('click', addBox);
    $('removeBtn').addEventListener('click', removeLast);
    $('removeAllBtn').addEventListener('click', removeAll);
    updateUI();

    // ── rAF レンダーループ ─────────────────────────────────────────────────
    function loop(ts) {
      renderer.render(ts);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // 最初に 3 つ追加してデモを見せる
    addBox(); addBox(); addBox();
  </script>
</body>
</html>
