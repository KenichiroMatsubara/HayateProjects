packages:
  - 'Hayate'
  - 'Hayate/host'
  - 'Hayate/proto'
  - 'Hayate/wasm-pkgs/pkg'
  - 'Hayate/wasm-pkgs/pkg-tiny-skia'
  - 'Hayate/wasm-pkgs/pkg-null'
  - 'Hayate/wasm-pkgs/pkg-layer-present'
  - 'Tsubame'
  - 'Tsubame/proto'
  - 'Tsubame/packages/*'
  - 'Tsubame/examples/*'
  - 'Torimi/bundle'
  - 'Torimi/cli'
  - 'Torimi/create-torimi'
  - 'Torimi/demo-endpoint'
  - 'Torimi/dev-server'
  - 'Torimi/dev-server-contract'
  - 'Torimi/host-web'
  - 'Torimi/integration'
  - 'Torimi/protocol-handshake'
  - 'fonts'

# tsup 8.5.1 / rollup-plugin-dts は TypeScript 7 の compiler API と未互換。
# workspace 内で自動導入される optional peer も含め、互換な 6 系へ統一する。
overrides:
  typescript: 6.0.3

allowBuilds:
  canvas: true
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - baseline-browser-mapping@2.10.33
  - tinyglobby@0.2.17
  - '@cloudflare/workers-types@5.20260705.1 || 5.20260722.1'
  - '@cloudflare/vitest-pool-workers@0.18.7'
  - miniflare@4.20260721.0
  - react@19.2.8
  - wrangler@4.113.0

onlyBuiltDependencies:
  - esbuild
