packages:
  - 'Hayate'
  - 'Hayate/host'
  - 'Hayate/proto'
  - 'Hayate/wasm-pkgs/pkg'
  - 'Hayate/wasm-pkgs/pkg-tiny-skia'
  - 'Hayate/wasm-pkgs/pkg-vello-cpu'
  - 'Hayate/wasm-pkgs/pkg-null'
  - 'Hayate/wasm-pkgs/pkg-layer-present'
  - 'Tsubame'
  - 'Tsubame/proto'
  - 'Tsubame/packages/*'
  - 'Tsubame/examples/*'
  - 'Miharashi/demo-endpoint'
  - 'Miharashi/dev-server'
  - 'Miharashi/dev-server-contract'
  - 'Miharashi/host-web'
  - 'Miharashi/integration'
  - 'Miharashi/protocol-handshake'
  - 'fonts'

allowBuilds:
  canvas: true
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - baseline-browser-mapping@2.10.33
  - tinyglobby@0.2.17
  - '@cloudflare/workers-types@5.20260705.1'

onlyBuiltDependencies:
  - esbuild
