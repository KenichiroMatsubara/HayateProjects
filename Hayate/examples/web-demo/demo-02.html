<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayate — Lv.2 Raw Layer インタラクティブ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    .back-link {
      display: inline-block;
      align-self: flex-start;
      margin-bottom: 14px;
      font-size: .68rem;
      color: #64748b;
      text-decoration: none;
      letter-spacing: .04em;
      padding: 4px 10px;
      border: 1px solid #334155;
      border-radius: 999px;
    }
    .back-link:hover { color: #94a3b8; border-color: #475569; }

    .lv-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: .6rem;
      font-weight: 900;
      letter-spacing: .08em;
      color: #fff;
      margin-bottom: 6px;
    }

    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 1rem; font-weight: 900; color: #f8fafc; letter-spacing: -.02em; }
    header p  { font-size: .7rem; color: #475569; margin-top: 4px; }

    .pipeline {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid #334155; background: #1e293b;
      font-size: .65rem; font-weight: 700; color: #64748b;
      white-space: nowrap; transition: all .2s;
    }
    .step .dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; flex-shrink: 0; }
    .step.ok   { color: #4ade80; border-color: #166534; background: #052e16; }
    .step.ok .dot   { background: #4ade80; }
    .step.run  { color: #818cf8; border-color: #3730a3; background: #1e1b4b; animation: pulse .9s ease-in-out infinite; }
    .step.run .dot  { background: #818cf8; }
    .step.fail { color: #f87171; border-color: #7f1d1d; background: #2d0a0a; }
    .step.fail .dot { background: #f87171; }
    .step.warn { color: #fbbf24; border-color: #78350f; background: #1c1002; }
    .step.warn .dot { background: #fbbf24; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .canvas-wrap {
      position: relative; border: 2px solid #334155;
      border-radius: 10px; overflow: hidden; background: #020617;
    }
    canvas { display: block; }
    #canvas-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; background: #020617ee;
      font-size: .85rem; color: #64748b; text-align: center;
      padding: 24px; transition: opacity .3s;
    }
    #canvas-overlay.gone { opacity: 0; pointer-events: none; }
    #overlay-icon { font-size: 2rem; }
    #overlay-msg  { font-weight: 700; }
    #overlay-sub  { font-size: .7rem; color: #475569; max-width: 380px; line-height: 1.6; }

    .panel {
      margin-top: 20px; width: 100%; max-width: 720px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .section { border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; }
    .section-title {
      padding: 8px 14px; font-size: .65rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .1em;
      color: #475569; background: #1e293b44;
    }
    .section-body { padding: 14px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }
    .field { display: flex; flex-direction: column; gap: 3px; font-size: .65rem; color: #64748b; }
    .field label { font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .field input {
      padding: 4px 6px; background: #0f172a;
      border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-family: inherit; font-size: .7rem;
    }
    .field input[type=number] { width: 76px; }
    .field input[type=color]  { width: 44px; height: 28px; padding: 2px; background: #1e293b; cursor: pointer; }
    button {
      padding: 6px 14px; border: 1px solid #334155; border-radius: 6px;
      background: #1e293b; color: #e2e8f0;
      font-family: inherit; font-size: .72rem; font-weight: 700; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    button:hover:not(:disabled) { background: #334155; border-color: #475569; }
    button:disabled { opacity: .35; cursor: not-allowed; }
    button.primary { background: #1d4ed8; border-color: #2563eb; color: #fff; }
    button.primary:hover:not(:disabled) { background: #2563eb; }
    button.danger { background: #7f1d1d; border-color: #b91c1c; color: #fca5a5; }
    button.danger:hover:not(:disabled) { background: #991b1b; }
    .bg-row { display: flex; align-items: center; gap: 10px; font-size: .72rem; color: #94a3b8; }

    .feature-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 0; font-size: .68rem; color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }
    .feature-row:last-child { border-bottom: none; }
    .feat-icon { font-size: .85rem; flex-shrink: 0; line-height: 1.3; }
    .feat-name { flex: 1; font-family: ui-monospace, monospace; }
    .feat-err  { color: #f87171; font-size: .6rem; flex: 2; word-break: break-all; opacity: .85; }
    .feat-pending { font-size: .62rem; color: #475569; font-style: italic; }
  </style>
</head>
<body>

  <a href="./index.html" class="back-link">← 一覧に戻る</a>

  <header>
    <div class="lv-badge" style="background:#ca8a04">Lv.2</div>
    <h1>Element Layer — インタラクティブ</h1>
    <p>apply_mutations で View を追加・削除する（ADR-0072）</p>
  </header>

  <div class="pipeline" id="pipeline">
    <div class="step" id="s1"><span class="dot"></span>WebGPU 検出</div>
    <div class="step" id="s2"><span class="dot"></span>WASM ロード</div>
    <div class="step" id="s3"><span class="dot"></span><span id="s3-label">Renderer 初期化</span></div>
    <div class="step" id="s4"><span class="dot"></span>初期描画</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="640" height="360"></canvas>
    <div id="canvas-overlay">
      <div id="overlay-icon">⏳</div>
      <div id="overlay-msg">初期化中...</div>
      <div id="overlay-sub"></div>
    </div>
  </div>

  <div class="panel">
    <div class="section">
      <div class="section-title">背景色 · render(bg_r, bg_g, bg_b)</div>
      <div class="section-body">
        <div class="bg-row">
          <label>背景色: <input type="color" id="bgColor" value="#0b1220" /></label>
          <button id="renderBtn" disabled>render() を実行</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">View を追加 · apply_mutations(append_child + set_style)</div>
      <div class="section-body">
        <div class="row">
          <div class="field"><label>W</label><input type="number" id="rw" value="200" min="1"   max="640" /></div>
          <div class="field"><label>H</label><input type="number" id="rh" value="120" min="1"   max="360" /></div>
          <div class="field"><label>Radius</label><input type="number" id="rr" value="12" min="0" max="180" /></div>
          <div class="field"><label>Fill</label><input type="color" id="rcolor" value="#3b82f6" /></div>
          <div class="field"><label>Alpha</label><input type="number" id="ralpha" value="1.0" min="0" max="1" step="0.05" /></div>
        </div>
        <div class="row">
          <button class="primary" id="addBtn" disabled>矩形を追加</button>
          <button class="danger"  id="clearAllBtn" disabled>すべて削除</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">機能テスト結果 — API が例外を投げないことを確認</div>
      <div class="section-body">
        <div id="featureResults"><span class="feat-pending">初期化後に自動実行...</span></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { HayateBatch, TAG, UNIT, DISPLAY, hexToRgb01 } from './element-batch.js';

    const $ = id => document.getElementById(id);
    function step(id, state) { $(id).className = `step ${state}`; }
    function overlay(icon, msg, sub = '') {
      $('overlay-icon').textContent = icon;
      $('overlay-msg').textContent  = msg;
      $('overlay-sub').textContent  = sub;
    }
    function overlayGone() { $('canvas-overlay').classList.add('gone'); }

    step('s1', 'run');
    overlay('🔍', 'WebGPU を検出中...');
    let webgpuOk = false;
    try {
      if (navigator.gpu) webgpuOk = !!(await navigator.gpu.requestAdapter());
    } catch { webgpuOk = false; }
    if (!webgpuOk) {
      step('s1', 'fail');
      overlay('❌', 'WebGPU 非対応', 'Element Layer Canvas Mode には Chromium 系が必要です。');
      throw new Error('no WebGPU');
    }
    step('s1', 'ok');

    step('s2', 'run');
    overlay('📦', 'WASM を読み込み中...');
    const mod = await import('./pkg/hayate_adapter_web.js');
    await mod.default();
    step('s2', 'ok');

    let renderer;
    const children = [];
    let rootId;

    function bgColor() { return hexToRgb01($('bgColor').value); }
    function render() {
      const [r, g, b] = bgColor();
      renderer.set_background_color(r, g, b);
      renderer.render(performance.now());
    }

    function initRoot() {
      const batch = new HayateBatch();
      batch.setRoot(rootId);
      batch.setStyle(rootId,
        TAG.WIDTH, 640, UNIT.PX,
        TAG.HEIGHT, 360, UNIT.PX,
        TAG.DISPLAY, DISPLAY.FLEX,
        TAG.GAP, 16, UNIT.PX,
        TAG.PADDING, 24, UNIT.PX,
        TAG.ALIGN_ITEMS, 0,
        TAG.JUSTIFY_CONTENT, 0,
      );
      batch.flush(renderer);
    }

    step('s3', 'run');
    overlay('⚙️', 'HayateElementRenderer を初期化中...');
    $('s3-label').textContent = 'Element Layer (Canvas)';
    renderer = await mod.HayateElementRenderer.init($('canvas'));
    rootId = renderer.element_create(mod.element_kind_view());
    step('s3', 'ok');

    step('s4', 'run');
    overlay('🎨', '初期シーンを構築中...');
    initRoot();
    render();
    step('s4', 'ok');
    overlayGone();

    // ── 機能テスト ─────────────────────────────────────────────────────────
    const results = $('featureResults');
    results.innerHTML = '';

    function test(label, fn) {
      const row = document.createElement('div');
      row.className = 'feature-row';
      try {
        fn();
        row.innerHTML = `<span class="feat-icon">✅</span><span class="feat-name">${label}</span>`;
      } catch(e) {
        row.innerHTML = `<span class="feat-icon">❌</span><span class="feat-name">${label}</span><span class="feat-err">${String(e).slice(0,140)}</span>`;
      }
      results.appendChild(row);
    }

    test('element_create + apply_mutations append/set_style', () => {
      const id = renderer.element_create(mod.element_kind_view());
      const batch = new HayateBatch();
      batch.appendChild(rootId, id);
      batch.setStyle(id, TAG.WIDTH, 8, UNIT.PX, TAG.HEIGHT, 8, UNIT.PX);
      batch.flush(renderer);
      const rm = new HayateBatch();
      rm.remove(id);
      rm.flush(renderer);
    });
    test('render(timestamp_ms)', () => render());

    // ── コントロール配線 ───────────────────────────────────────────────────
    $('renderBtn').disabled = false;
    $('renderBtn').addEventListener('click', render);
    $('bgColor').addEventListener('input', render);

    $('addBtn').disabled = false;
    $('addBtn').addEventListener('click', () => {
      const w = Number($('rw').value);
      const h = Number($('rh').value);
      const radius = Number($('rr').value);
      const alpha = Number($('ralpha').value);
      const [r, g, b] = hexToRgb01($('rcolor').value);
      const id = renderer.element_create(mod.element_kind_view());
      const batch = new HayateBatch();
      batch.appendChild(rootId, id);
      batch.setStyle(id,
        TAG.WIDTH, w, UNIT.PX,
        TAG.HEIGHT, h, UNIT.PX,
        TAG.BACKGROUND_COLOR, r, g, b, alpha,
        TAG.BORDER_RADIUS, radius,
        TAG.OPACITY, alpha,
      );
      batch.flush(renderer);
      children.push(id);
      render();
    });

    $('clearAllBtn').disabled = false;
    $('clearAllBtn').addEventListener('click', () => {
      const batch = new HayateBatch();
      for (const id of children) batch.remove(id);
      batch.flush(renderer);
      children.length = 0;
      render();
    });
  </script>
</body>
</html>
