name: Deploy demo to GitHub Pages

on:
  # main への push ごとに自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能
  workflow_dispatch:

# Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走った場合は最新の push を優先（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Tsubame Todo + Hayabusa present demos (Rust WASM + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Rust / wasm-pack（hayate-adapter-web の WASM をビルド）──────────────
      - name: Set up Rust (wasm32 target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        # jetli/wasm-pack-action の version: latest は GitHub API で最新版を解決するが、
        # API レート制限に当たると古い v0.9.1 へフォールバックする。0.9.1 はワークスペース
        # 継承マニフェスト（license.workspace = true 等）を解釈できず、manifest の parse に
        # 失敗してビルドが落ちていた。wasm-c3.yml と同じく crates.io から固定的に入れる。
        run: cargo install wasm-pack --locked

      # ── Node / pnpm ────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build WASM (hayate-adapter-web)
        # setup-rust-toolchain は既定で RUSTFLAGS=-Dwarnings を立てる。
        # web パスには本筋と無関係の dead_code 警告があるため空にする
        # （android-adapter.yml と同じ理由）。
        env:
          RUSTFLAGS: ""
        run: pnpm --filter hayate build

      - name: Build @hayate/host
        # todo example は `import('@hayate/host')` で host bootstrap を取り込む（#477）。
        # exports は dist/index.js（tsup 成果物）だけを向くので、ここで build しないと
        # Rolldown が import を解決できずビルドが落ちる。
        # NOTE: ルートの `build:host` スクリプトは cbdcc10（Windows ビルド整理）で
        # 撤去されたため、`build:wasm`（133bf39）と同様にフィルタを直接呼ぶ。
        run: pnpm --filter @hayate/host build

      - name: Build Tsubame packages
        # `build:tsubame` も cbdcc10 で撤去済み。Tsubame/packages/* を直接フィルタする。
        run: pnpm --filter "./Tsubame/packages/*" build

      - name: Build Tsubame Todo example
        # GitHub Pages の project site 配下に置くため base を合わせる
        # （リポジトリ名が変わったらここも変える）。vite.config が VITE_BASE を読む。
        env:
          VITE_BASE: /HayateProjects/
        run: pnpm --filter @tsubame/example-todo run build

      - name: Build Tsubame React Todo example
        # React 版（tsubame-react）デモは Pages の /react/ サブパスに同梱する。
        # base はサブパスに合わせる（todo と同じく VITE_BASE 経由）。
        env:
          VITE_BASE: /HayateProjects/react/
        run: pnpm --filter @tsubame/example-react-todo run build

      - name: Build Hayabusa web present demo (Rust WASM)
        # Hayabusa が組む hayate_core::ElementTree を、wire を介さず in-process Rust
        # projection（ADR-0045）で直接駆動し、hayate-adapter-web の tiny-skia バックエンドが
        # canvas へ present するデモ。Tsubame 経路を介さない。Pages の /hayabusa/ に同梱する。
        # index.html の import は相対なのでサブパス base は不要。setup-rust-toolchain の
        # -Dwarnings は空にする（vendored crate の無害な警告のため。hayate WASM build と同じ理由）。
        env:
          RUSTFLAGS: ""
        run: wasm-pack build Hayabusa/web-demo --target web --release --out-dir pkg

      - name: Assemble Pages site (todo at root, react-todo under /react, hayabusa under /hayabusa)
        # Solid 版を root、React 版を /react/、Hayabusa present デモを /hayabusa/ に置いた
        # 単一の成果物へまとめる。
        run: |
          mkdir -p Tsubame/examples/todo/dist/react
          cp -r Tsubame/examples/react-todo/dist/. Tsubame/examples/todo/dist/react/
          mkdir -p Tsubame/examples/todo/dist/hayabusa/pkg
          cp Hayabusa/web-demo/index.html Tsubame/examples/todo/dist/hayabusa/index.html
          cp Hayabusa/web-demo/pkg/hayabusa_web_demo.js \
             Hayabusa/web-demo/pkg/hayabusa_web_demo_bg.wasm \
             Tsubame/examples/todo/dist/hayabusa/pkg/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Tsubame/examples/todo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
