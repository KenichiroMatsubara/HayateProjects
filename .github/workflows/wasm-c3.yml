name: WASM C3 integration

on:
  push:
    branches: [main]
    paths:
      - 'Hayate/**'
      - 'Tsubame/packages/renderer-canvas/**'
      - 'Tsubame/proto/**'
      - 'Hayate/proto/**'
      - '.github/workflows/wasm-c3.yml'
  pull_request:
    paths:
      - 'Hayate/**'
      - 'Tsubame/packages/renderer-canvas/**'
      - 'Tsubame/proto/**'
      - 'Hayate/proto/**'
      - '.github/workflows/wasm-c3.yml'

concurrency:
  group: wasm-c3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codec-c3:
    name: TS flush → WASM apply_mutations (ADR-0055 C3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "-D warnings -A dead_code -A unused_variables -A unused_imports -A unreachable_patterns"

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Hayate WASM (incl. pkg-null for C3)
        run: pnpm run build:wasm

      - name: Build renderer-canvas test dependencies
        run: |
          pnpm --filter @tsubame/protocol-generated run generate
          pnpm --filter @tsubame/renderer-protocol build
          # golden-frame テストは @tsubame/solid を import する。dist/ が無いと
          # Vite が "Failed to resolve entry" でスイート読込ごと失敗するためビルド。
          pnpm --filter @tsubame/solid build

      - name: Run renderer-canvas C3 tests
        working-directory: Tsubame/packages/renderer-canvas
        run: pnpm run test:wasm

  pointer-input-firefox:
    name: Self-wired pointer input (ADR-0092, Firefox headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # codec-c3 ジョブと同理由。未使用系（never used / unreachable_patterns）
          # だけ -A で許可し、本物の警告は -D warnings のまま落とす。
          rustflags: "-D warnings -A dead_code -A unused_variables -A unused_imports -A unreachable_patterns"

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run pointer-input wasm-bindgen tests (backend-null)
        working-directory: Hayate
        run: |
          # wasm-pack 0.15 の CLI 変更（PR #851）: クレートパスと cargo test への
          # 追加オプションは位置引数で直接渡す。旧来の `--` を置くと後続フラグが
          # テストバイナリ(harness)側に流れて "unexpected argument" で落ちる。
          wasm-pack test --headless --firefox crates/adapters/web \
            --no-default-features --features backend-null \
            --test pointer_input_browser \
            --test html_text_input_focus_ring_browser \
            --test edit_input_browser
