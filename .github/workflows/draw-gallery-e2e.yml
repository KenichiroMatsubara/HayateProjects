name: Draw Gallery e2e

# issue #732: draw ギャラリー example の Playwright e2e を CI で回す。DOM Renderer 経路
# （canvas 2D replay）はヘッドレス Chromium で実描画を検証できるので Rust/WASM 不要。
# Hayate Renderer 経路（tiny-skia）は WASM 未ビルド環境では spec 側が理由付きで skip する
# ので、この軽量ジョブでも安定して green になる（実描画の確認は deploy-pages が WASM を
# 積む本番ビルドや、WASM ビルド済みのローカルで行う）。

on:
  push:
    branches: [main]
    paths:
      - 'Tsubame/examples/draw-gallery/**'
      - 'Tsubame/packages/**'
      - 'Hayate/host/**'
      - '.github/workflows/draw-gallery-e2e.yml'
  pull_request:
    paths:
      - 'Tsubame/examples/draw-gallery/**'
      - 'Tsubame/packages/**'
      - 'Hayate/host/**'
      - '.github/workflows/draw-gallery-e2e.yml'
  workflow_dispatch:

jobs:
  e2e:
    name: Unit + Playwright (DOM path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # preinstall（bootstrap-wasm-pkgs）が WASM 成果物の stub を用意するので、Rust を
        # 積まなくても @torimi/hayate-host / vite の import は解決できる（tiny-skia 経路は実行時に
        # 「WASM not built」で spec が skip する）。
        run: pnpm install --frozen-lockfile

      - name: Build @torimi/hayate-host
        # main.tsx が `import('@torimi/hayate-host')` で取り込む。exports は dist を向くので、
        # 先に tsup 成果物を作らないと vite が解決できない（deploy-pages と同じ理由）。
        run: pnpm --filter @torimi/hayate-host build

      - name: Build Tsubame packages
        run: pnpm --filter "./Tsubame/packages/*" build

      - name: Unit tests (painters)
        run: pnpm --filter @tsubame/example-draw-gallery test

      - name: Install Playwright Chromium
        run: pnpm --filter @tsubame/example-draw-gallery exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm --filter @tsubame/example-draw-gallery test:e2e
