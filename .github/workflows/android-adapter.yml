name: Android adapter cross-compile

on:
  push:
    branches: [main]
    paths:
      - 'Hayate/crates/platform/mobile/android/**'
      - 'Hayate/scripts/verify-android-stage-a.sh'
      - '.github/workflows/android-adapter.yml'
  pull_request:
    paths:
      - 'Hayate/crates/platform/mobile/android/**'
      - 'Hayate/scripts/verify-android-stage-a.sh'
      - '.github/workflows/android-adapter.yml'

concurrency:
  group: android-adapter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: hayate-adapter-android (host tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hayate
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run adapter unit and packaging tests
        # Host CI uses -Dwarnings from setup-rust-toolchain; hayate-core has
        # unrelated dead_code on the host path. Match the cross-compile seam (#194).
        env:
          RUSTFLAGS: ""
        run: cargo test -p hayate-adapter-android

  cross-compile:
    name: hayate-adapter-android (aarch64-linux-android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hayate
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          # r27 LTS; compatible with android-activity 0.6 / ndk 0.9 (ADR-0087).
          ndk-version: r27c

      - name: Add aarch64-linux-android target
        run: rustup target add aarch64-linux-android

      - name: Configure Android linker (API 21)
        run: |
          NDK_BIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          # android-activity の game-activity feature は C++ を含むため cc-rs が C++
          # コンパイラを要求する。CC だけだと既定名 aarch64-linux-android-clang++
          # (API 番号なし) を探して失敗するので、API21 付きの実体を明示する。
          echo "CXX_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android21-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=${NDK_BIN}/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Cross-compile hayate-adapter-android
        # Host CI uses -Dwarnings from setup-rust-toolchain; Android builds
        # compile fewer hayate-core paths and would fail on unrelated dead_code
        # before reaching hayate-adapter-android (the seam #194 needs).
        env:
          RUSTFLAGS: ""
        run: cargo build -p hayate-adapter-android --target aarch64-linux-android

  apk-build:
    name: hayate-adapter-android (cargo apk build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hayate
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add aarch64-linux-android target
        run: rustup target add aarch64-linux-android

      - name: Configure Android linker (API 21)
        run: |
          NDK_BIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          # android-activity の game-activity feature は C++ を含むため cc-rs が C++
          # コンパイラを要求する。CC だけだと既定名 aarch64-linux-android-clang++
          # (API 番号なし) を探して失敗するので、API21 付きの実体を明示する。
          echo "CXX_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android21-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=${NDK_BIN}/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install Android platform for cargo-apk
        run: sdkmanager "platforms;android-30"

      - name: Build installable APK
        env:
          RUSTFLAGS: ""
        run: cargo apk build -p hayate-adapter-android --lib

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hayate-adapter-android-apk
          path: Hayate/target/debug/apk/hayate-adapter-android.apk
