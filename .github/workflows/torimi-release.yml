name: Torimi release lockstep

# リリース lockstep デプロイ（ADR-0003 / #741）。トリガはリリースタグ（torimi-android-v*）と
# 手動実行のみ — main への push ではデプロイしない。Play 配布済みホストに焼き込まれた
# Protocol Version とデモバンドルの整合を「注意」ではなく「構造」で守るため、ホスト（将来の
# AAB）とデモバンドルは常に同じタグ付きコミットから作る。
#
# タグ名パターンはここ（on.push.tags）が唯一の記載箇所（GitHub Actions は on: で env を参照
# できないため、値の集約先はトリガ定義そのもの）。契約は
# Torimi/integration/src/release-lockstep-workflow.test.ts が固定する。
on:
  push:
    tags:
      - torimi-android-v*
  workflow_dispatch:

permissions:
  contents: read

# 同一リリースの多重デプロイを直列化する（キャンセルはしない — タグごとに完走させる）。
concurrency:
  group: torimi-release
  cancel-in-progress: false

# 繰り返し参照する値の名前付き集約（タグ名パターンだけは on.push.tags が集約先 — 上記コメント）。
env:
  NODE_VERSION: 22
  DEMO_ENDPOINT_FILTER: "@torimi/demo-endpoint"

jobs:
  # 将来の AAB ビルド（Play 提出物）は同じタグに乗る別ジョブとしてここに並ぶ（ADR-0003）。
  # 今はデモデプロイのみ。
  deploy-demo-endpoint:
    name: Build demo bundles and deploy the Demo Endpoint
    runs-on: ubuntu-latest
    steps:
      # タグの付いたコミットそのものを checkout する — ホスト（将来の AAB）とデモバンドルが
      # 常に同一コミット由来になり、Protocol Version 不一致が構造で防がれる。
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── デモバンドルの workspace 依存を組み立てる（deploy-pages.yml と同じ順序）─────────
      # example の torimi:native:build は @hayate/host / Tsubame packages の dist を import する。
      # Native Host バンドルはネイティブホスト前提なので WASM ビルドは要らない。
      - name: Build @hayate/host
        run: pnpm --filter @hayate/host build

      - name: Build Tsubame packages
        run: pnpm --filter "./Tsubame/packages/*" build

      # 単一エントリ（#767）は `@torimi/bundle`（Bundle Registration）の dist を import する。
      # `...` サフィックスで依存（@torimi/protocol-handshake 等）も一緒に組み立てる。
      - name: Build @torimi/bundle (Bundle Registration)
        run: pnpm --filter "@torimi/bundle..." build

      # ── デモバンドル：solid / react の torimi:native:build（Hermes 降格済み）────────────
      # デモ一覧の正本は demo-endpoint の demos.json。build:demos がそれを読んで各パッケージの
      # torimi:native:build を回し、成果物を public/ に集める — ワークフローにデモ一覧を複製しない。
      - name: Build demo bundles (solid / react torimi:native:build)
        run: pnpm --filter "$DEMO_ENDPOINT_FILTER" run build:demos

      # ── デプロイ：静的アセット（public/）＋ Worker を wrangler で Demo Endpoint へ ─────
      # 必要 Secrets（Workers 編集権限に絞った CLOUDFLARE_API_TOKEN と CLOUDFLARE_ACCOUNT_ID）の
      # 登録手順は Torimi/demo-endpoint/README.md を参照。
      - name: Deploy the Demo Endpoint (wrangler deploy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter "$DEMO_ENDPOINT_FILTER" run deploy
