name: Protocol spec

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: proto-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hayate-proto:
    name: Hayate validate + generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate spec, generate Rust, diff check
        working-directory: Hayate
        run: npm run check:proto

  tsubame-proto:
    name: Tsubame generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript, diff check
        working-directory: Tsubame
        run: pnpm run check:proto
