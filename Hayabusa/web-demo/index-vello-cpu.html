<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hayabusa → Web present demo (vello_cpu)</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 360px;
        height: 240px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Hayabusa が組んだ ElementTree を vello_cpu が描き込む surface（tiny-skia 置き換え候補の検証用）。 -->
    <canvas id="app" width="360" height="240"></canvas>
    <script type="module">
      import init, { boot } from './pkg-vello-cpu/hayabusa_web_demo.js';

      const canvas = document.getElementById('app');
      await init();
      await boot(canvas);
      // e2e（Playwright）が描画完了を待てるよう合図する。
      document.documentElement.dataset.hayabusaReady = '1';
    </script>
  </body>
</html>
